---
layout: default
title: Work
---
<div class="sec-hd"><span class="sec-lbl">All projects</span><div class="sec-line"></div></div>

<div class="proj-list">
  {% assign posts = site.posts | sort: 'date' | reverse %}
  {% for post in posts %}
  <a class="proj-item" href="{{ post.url }}">
    <span class="proj-year">{{ post.date | date: "%Y" }}</span>
    <div>
      <p class="proj-cat">{{ post.category }}</p>
      <p class="proj-title">{{ post.title }}</p>
      <p class="proj-desc">{{ post.summary }}</p>
    </div>
    <span class="proj-arrow">↗</span>
  </a>
  {% endfor %}
</div>
